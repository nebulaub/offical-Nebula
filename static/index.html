<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula learning</title>
  <link rel="icon" type="i/x-icon" href="/i/nebula.png">
  
  <script src="/atlas.register.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000; 
      color: #ccc;
      font-family: monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; 
    }

   
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; 
    }

    .wrap {
      width: 420px;
      padding: 0 1rem;
      position: relative;
      z-index: 1; 
    }

    h1 {
      font-size: 1.1rem;
      font-weight: normal;
      color: #fff;
      margin-bottom: 1.25rem;
      letter-spacing: 0.02em;
    }

    h1 span {
      color: #555;
      font-size: 0.85rem;
      margin-left: 0.4rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      background: rgba(26, 26, 26, 0.9); 
      border: 1px solid #2a2a2a;
      color: #ddd;
      font-family: monospace;
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
      outline: none;
    }

    input:focus { border-color: #444; }
    input::placeholder { color: #444; }

    button {
      background: #222;
      border: 1px solid #2a2a2a;
      color: #aaa;
      font-family: monospace;
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    button:hover { background: #2a2a2a; color: #fff; }

    .links {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
    }

    .links a {
      color: #444;
      text-decoration: none;
    }

    .links a:hover { color: #888; }
  </style>
</head>
<body>


  <canvas id="starfield"></canvas>

  <div class="wrap">
    <h1>Nebula<span>powered by atlas</span></h1>
    <form id="f">
      <input id="u" type="text" placeholder="search or enter a url." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </form>
    <div class="links">
      <a href="/g/index.html">games</a>
    </div>
  </div>

  <script>
 
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let shootingStar = null;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

   
    for (let i = 0; i < 350; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        opacity: Math.random(),
        speed: 0.01 + Math.random() * 0.03
      });
    }

    function createShootingStar() {
      shootingStar = {
        x: Math.random() * canvas.width,
        y: 0,
        len: Math.random() * 80 + 20,
        speed: Math.random() * 10 + 5,
        opacity: 1
      };
    }

    function draw() {
   
      const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
      grad.addColorStop(0, '#0a0f1e');
      grad.addColorStop(1, '#000');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

     
      stars.forEach(star => {
        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();

      
        star.opacity += (Math.random() - 0.5) * 0.04;
        if (star.opacity < 0.1) star.opacity = 0.1;
        if (star.opacity > 1) star.opacity = 1;
      });

     
      if (!shootingStar && Math.random() < 0.005) {
        createShootingStar();
      }

      if (shootingStar) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${shootingStar.opacity})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(shootingStar.x, shootingStar.y);
        ctx.lineTo(shootingStar.x - shootingStar.len, shootingStar.y + shootingStar.len);
        ctx.stroke();

        shootingStar.x += shootingStar.speed;
        shootingStar.y += shootingStar.speed;
        shootingStar.opacity -= 0.01;

        if (shootingStar.opacity <= 0 || shootingStar.y > canvas.height) {
          shootingStar = null;
        }
      }

      requestAnimationFrame(draw);
    }
    draw();

    !function(){
      function enc(u){
        try{return btoa(encodeURIComponent(u)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"")}
        catch(e){return null}
      }
      function norm(s){
        s=s.trim();
        if(!s)return null;
        if(/^https?:\/\//i.test(s)){
          try{new URL(s);return s}catch(e){}
          return null;
        }
        if(/\.|^localhost(:\d+)?$/.test(s)){
          try{new URL("https://"+s);return"https://"+s}catch(e){}
        }
        return"https://duckduckgo.com"+encodeURIComponent(s);
      }
      document.getElementById("f").onsubmit=function(e){
        e.preventDefault();
        var v=document.getElementById("u").value;
        var n=norm(v);if(!n)return;
        var c=enc(n);if(!c)return;
        location.href="/atlas/"+c;
      };
    }();
  </script>
</body>
</html>
